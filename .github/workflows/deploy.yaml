name: Deploy to VPS

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync main with upstream main and push to origin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Ensure upstream remote exists
          if ! git remote get-url upstream >/dev/null 2>&1; then
            echo "Adding upstream remote..."
            git remote add upstream https://github.com/enfyra/app.git
          fi

          echo "Fetching origin and upstream main..."
          git fetch origin main --force
          git fetch upstream main --force

          echo "Checking out main and resetting to origin/main..."
          git checkout main
          git reset --hard origin/main

          if git rev-parse --quiet "upstream/main" >/dev/null; then
            COMMITS_BEHIND=$(git rev-list --count HEAD.."upstream/main" 2>/dev/null || echo "0")
            echo "Commits behind upstream/main: $COMMITS_BEHIND"

            if [ "$COMMITS_BEHIND" != "0" ]; then
              echo "🔄 Merging upstream/main into main..."
              git merge "upstream/main" --no-edit --no-ff || {
                echo "⚠️ Merge conflict detected. Retrying with 'theirs' strategy..."
                git merge --abort 2>/dev/null || true
                git merge "upstream/main" --no-edit -X theirs || {
                  echo "❌ Failed to merge upstream/main. Keeping origin/main state."
                }
              }
            else
              echo "✅ main is already up to date with upstream/main."
            fi
          else
            echo "ℹ️ No upstream/main branch available. Skipping upstream merge."
          fi

          # Only push if HEAD differs from origin/main
          if ! git diff --quiet origin/main..HEAD; then
            echo "Pushing updated main to origin..."
            git push origin main --force-with-lease
          else
            echo "✅ No changes to push to origin/main."
          fi

      - name: Setup SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

      - name: Deploy to VPS via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          EVENT_NAME="${{ github.event_name }}"
          ssh $VPS_USER@$VPS_HOST "bash -s \"$EVENT_NAME\"" <<'ENDSSH'
            # Set project variables
            export PROJECT_NAME="demo-app"
            export APP_DIR="/apps/demo-app"
            export EVENT_NAME="$1"

            # Setup PATH for tools
            export PATH="$PATH:/usr/bin:/usr/local/bin:$HOME/.local/bin"

            # Find tool paths
            GIT_PATH=$(which git || echo "/usr/bin/git")
            NPM_PATH=$(which npm || echo "/usr/bin/npm")
            YARN_PATH=$(which yarn || echo "")
            PM2_PATH=$(which pm2 || echo "$HOME/.local/bin/pm2")

            # Install yarn if not found
            if [ -z "$YARN_PATH" ]; then
              echo "Yarn not found, installing..."
              $NPM_PATH install -g yarn
              YARN_PATH=$(which yarn || echo "$HOME/.local/bin/yarn")
            fi

            echo "=== Deploy triggered by $EVENT_NAME ==="

            echo "Tools found:"
            echo "Git: $GIT_PATH"
            echo "NPM: $NPM_PATH"
            echo "Yarn: $YARN_PATH"
            echo "PM2: $PM2_PATH"

            # Navigate to app directory
            cd $APP_DIR
            echo "Current directory: $(pwd)"

            # Ensure we're on main branch
            $GIT_PATH checkout main 2>/dev/null || true

            # Capture current commit before fetch
            CURRENT_COMMIT=$($GIT_PATH rev-parse HEAD 2>/dev/null || echo "none")
            echo "Current local commit: $CURRENT_COMMIT"

            # Fetch latest from origin and decide whether to deploy
            if $GIT_PATH fetch origin main --force 2>&1; then
              ORIGIN_COMMIT=$($GIT_PATH rev-parse origin/main 2>/dev/null || echo "none")
              echo "Remote commit (origin/main): $ORIGIN_COMMIT"

              if [ "$CURRENT_COMMIT" != "none" ] && [ "$ORIGIN_COMMIT" != "none" ] && [ "$CURRENT_COMMIT" = "$ORIGIN_COMMIT" ]; then
                echo "✅ No new commits on origin/main. Skipping redeploy."
                exit 0
              fi

              echo "Updating working tree to origin/main..."
              $GIT_PATH reset --hard origin/main
              $GIT_PATH clean -fd
              echo "✅ Code updated to latest from origin/main"
            else
              echo "⚠️ Failed to fetch from origin. Continuing with existing code..."
            fi

            FINAL_COMMIT=$($GIT_PATH rev-parse HEAD 2>/dev/null || echo "unknown")
            echo "✅ Deploying commit: $FINAL_COMMIT"

            # Install dependencies with yarn
            # Note: Removed yarn upgrade to avoid memory issues and stuck processes
            echo "Installing dependencies with yarn..."
            # Increase Node.js heap size to avoid OOM during yarn install
            # Use higher heap size and pass it directly to yarn
            export NODE_OPTIONS="--max-old-space-size=8192"
            # Use frozen lockfile to avoid dependency resolution (saves memory)
            # Reduce network concurrency to lower memory usage
            env NODE_OPTIONS="--max-old-space-size=8192" $YARN_PATH install \
              --ignore-engines \
              --network-timeout 100000 \
              --frozen-lockfile \
              --network-concurrency 1 \
              --prefer-offline || {
              echo "❌ yarn install failed - build will likely fail"
              exit 1
            }

            # Ensure environment file exists (CI only verifies presence)
            if [ ! -f .env ]; then
              echo "⚠️  .env not found. Please provision /apps/demo-app/.env manually on the server."
            fi

            # Build application
            echo "Building application..."
            # Ensure NODE_OPTIONS is set for build to avoid OOM
            export NODE_OPTIONS="--max-old-space-size=8192"
            env NODE_OPTIONS="--max-old-space-size=8192" $YARN_PATH build || {
              echo "❌ Build failed"
              exit 1
            }

            # Stop PM2 application completely to avoid conflicts
            echo "Stopping PM2 application..."
            $PM2_PATH stop $PROJECT_NAME || true
            $PM2_PATH delete $PROJECT_NAME || true

            # Clean start PM2 application
            echo "Starting PM2 application clean..."
            $PM2_PATH start ecosystem.config.cjs

            # Wait for app to initialize
            echo "Waiting for app initialization..."
            sleep 10

            # Show PM2 status
            $PM2_PATH status

            # Health check summary
            echo "=== Health Check ==="
            sleep 5
            if $PM2_PATH show $PROJECT_NAME | grep -q "online"; then
              echo "✅ Application is running successfully"
            else
              echo "❌ Application failed to start"
              $PM2_PATH logs $PROJECT_NAME --lines 20 --nostream
              exit 1
            fi

            # Show logs without tailing (just print and exit)
            echo "=== Recent logs ==="
            $PM2_PATH logs $PROJECT_NAME --lines 30 --nostream || {
              echo "Using alternative log method..."
              timeout 3s $PM2_PATH logs $PROJECT_NAME --lines 30 || true
            }

            echo "=== PM2 Deployment completed successfully ==="
          ENDSSH
